        <section class="relative border-b border-white/10 bg-black py-28 md:py-40 text-center overflow-hidden flex flex-col items-center justify-center min-h-[55vh]">

            <div class="absolute inset-0 bg-gradient-to-b from-black via-transparent to-black"></div>

          <div class="relative z-10 max-w-4xl mx-auto px-4 md:px-8">
            <h2 class="text-3xl md:text-5xl font-bold text-white tracking-[-0.04em] mb-8 leading-tight break-keep drop-shadow-2xl">
              발사대회의 뜨거운 현장을<br/>가까이서 경험해보세요
            </h2>
            <div class="text-gray-100 text-base md:text-[17px] leading-relaxed break-keep space-y-4 max-w-2xl mx-auto drop-shadow-lg font-medium">
              <p>NURA 전국대학교로켓발사대회의 생생한 순간을 직접 참관할 수 있습니다.</p>
              <p>대학생들의 땀과 열정이 담긴 로켓이 하늘로 솟아오르는 감동을 함께 나누어보세요.</p>
            </div>
          </div>
        </section>
        
        <section class="bg-black py-20 md:py-28">
          <div class="max-w-5xl mx-auto px-4 md:px-8 text-center">
            <h2 class="text-3xl md:text-5xl font-bold text-white tracking-[-0.04em] mb-6 leading-tight break-keep">
              참관 신청서 작성
            </h2>
            <div class="text-gray-400 text-base md:text-[17px] leading-relaxed break-keep max-w-3xl mx-auto mb-16">
              현장 참관을 희망하시는 분들은 아래 폼을 작성해 주세요. 제출이 완료되면 기재해주신 이메일로 상세 일정과 참관 유의사항을 안내해 드립니다.
            </div>

            <div class="rounded-[2rem] border border-white/10 bg-white/[0.03] backdrop-blur-xl overflow-hidden p-2 md:p-3 shadow-2xl text-left mx-auto">
              <!-- 
                ⚠️ Google Forms URL 교체 안내:
                아래 iframe의 src를 실제 Google Forms URL로 교체하세요.
                Google Forms → 보내기 → 링크 아이콘 → "임베드 HTML" 에서 URL을 복사하세요.
                URL 형식: https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform?embedded=true
              -->
              <iframe 
                id="launch-apply-form"
                src="https://docs.google.com/forms/d/e/1FAIpQLSdgQXff9Kqm5V61tGQyMQ5aW1FFnLX-SeD0_90yu9eBZ_LT0Q/viewform?embedded=true" 
                width="100%" 
                height="800" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0"
                style="background: white; border-radius: 1.5rem;"
                loading="lazy"
                title="발사대회 참가 신청서"
              >로딩 중…</iframe>
            </div>

            <p class="mt-6 text-[13px] md:text-[15px] text-gray-500">
              * 폼이 보이지 않을 경우 
              <a href="https://forms.gle/4SzLBQbuRa8Q6gTz7" 
                 target="_blank" 
                 rel="noopener noreferrer" 
                 class="text-blue-400 underline underline-offset-2 hover:text-blue-300 transition">
                여기를 클릭하여 직접 접속
              </a>해 주세요.
            </p>
