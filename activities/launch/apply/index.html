  <body class="bg-black text-white min-h-screen overflow-x-hidden" data-current-page="activities" data-base-path="../../..">
    <div class="page-shell flex flex-col">
      <div data-shared-header></div>

      <main class="w-full flex-1 flex flex-col">
        <section class="bg-black">
          <div class="max-w-7xl mx-auto px-4 md:px-8 pt-12 md:pt-12 pb-16 md:pb-12">
            <section class="px-0 md:px-2 lg:px-4 pt-12 md:pt-16 pb-6 md:pb-8 border-b border-white/10">
              <div class="max-w-5xl">
                <h1 class="page-main-title mt-5 text-[42px] md:text-[72px] leading-none tracking-[-0.06em] font-semibold text-white break-keep">발사대회 참관 신청</h1>
              </div>
            </section>

            <section class="px-0 md:px-2 lg:px-4 py-3 md:py-4">
              <div class="border-t border-white/10">
                <article class="py-6 md:py-8 border-b border-white/10">
                  <div class="grid grid-cols-1 md:grid-cols-[170px_minmax(0,1fr)] gap-4 md:gap-8">
                    <div class="text-sm md:text-base text-white/45 font-medium tracking-[-0.01em]">참관 신청</div>
                    <div class="min-w-0">
                      <h2 class="text-[22px] md:text-[30px] leading-[1.22] tracking-[-0.04em] font-semibold text-white break-keep">신청서 작성</h2>
                      <p class="mt-3 text-sm md:text-[15px] leading-7 text-white/55 break-keep max-w-4xl">
                        아래 양식을 통해 전국대학교로켓발사대회 참관을 신청할 수 있습니다. 신청서 제출 후 별도 안내 메일이 발송됩니다.
                      </p>
                      <div class="mt-6 rounded-[1.75rem] border border-white/10 bg-white/[0.03] overflow-hidden">
                        <!-- 
                          ⚠️ Google Forms URL 교체 안내:
                          아래 iframe의 src를 실제 Google Forms URL로 교체하세요.
                          Google Forms → 보내기 → 링크 아이콘 → "임베드 HTML" 에서 URL을 복사하세요.
                          URL 형식: https://docs.google.com/forms/d/e/YOUR_FORM_ID/viewform?embedded=true
                        -->
                        <iframe 
                          id="launch-apply-form"
                          src="https://docs.google.com/forms/d/e/1FAIpQLSdgQXff9Kqm5V61tGQyMQ5aW1FFnLX-SeD0_90yu9eBZ_LT0Q/viewform?embedded=true" 
                          width="100%" 
                          height="800" 
                          frameborder="0" 
                          marginheight="0" 
                          marginwidth="0"
                          style="background: white; border-radius: 1.75rem;"
                          loading="lazy"
                          title="발사대회 참가 신청서"
                        >로딩 중…</iframe>
                      </div>
                      <p class="mt-4 text-xs md:text-sm text-white/35">
                        * 폼이 보이지 않을 경우 
                        <a href="https://forms.gle/4SzLBQbuRa8Q6gTz7" 
                           target="_blank" 
                           rel="noopener noreferrer" 
                           class="underline underline-offset-2 hover:text-white/55 transition">
                          여기를 클릭하여 직접 접속
                        </a>해 주세요.
                      </p>
                    </div>
                  </div>
                </article>
              </div>
            </section>

            <section class="px-0 md:px-2 lg:px-4 pt-2 pb-12 md:pb-14">
              <div class="border-t border-white/10 pt-8 md:pt-10">
