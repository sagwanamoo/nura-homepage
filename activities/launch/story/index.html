<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NURA | 발사대회 참관 스토리</title>
    <meta name="description" content="NURA 전국대학교로켓발사대회 참관 안내 인스타그램 스토리용 9:16 페이지입니다." />
    <meta property="og:title" content="NURA | 발사대회 참관 스토리" />
    <meta property="og:description" content="NURA 전국대학교로켓발사대회 참관 안내" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nura.kr/activities/launch/story/" />
    <meta property="og:image" content="https://nura.kr/source/resources/launch.jpg" />
    <link rel="icon" type="image/png" sizes="32x32" href="../../../source/resources/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../../../source/resources/favicon-16x16.png" />
    <link rel="shortcut icon" type="image/png" href="../../../source/resources/favicon-32x32.png" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        min-height: 100%;
        margin: 0;
        background: #050505;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100dvh;
        overflow: hidden;
        color: #ffffff;
        font-family: "Pretendard", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }

      a {
        color: inherit;
      }

      .story-stage {
        display: grid;
        place-items: center;
        width: 100vw;
        height: 100dvh;
        background: #050505;
      }

      .story-frame {
        position: relative;
        width: min(100vw, calc(100dvh * 9 / 16));
        height: min(100dvh, calc(100vw * 16 / 9));
        aspect-ratio: 9 / 16;
        overflow: hidden;
        background: #000000;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        isolation: isolate;
      }

      .story-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 52%;
        opacity: 1;
        filter: brightness(0.72) contrast(1.04) saturate(0.95);
        transform: scale(1.02);
      }

      .story-frame::before,
      .story-frame::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
      }

      .story-frame::before {
        background:
          linear-gradient(180deg, rgba(0, 0, 0, 0.64) 0%, rgba(0, 0, 0, 0.22) 27%, rgba(0, 0, 0, 0.28) 58%, rgba(0, 0, 0, 0.66) 100%),
          linear-gradient(90deg, rgba(0, 0, 0, 0.34) 0%, rgba(0, 0, 0, 0.04) 34%, rgba(0, 0, 0, 0.04) 66%, rgba(0, 0, 0, 0.34) 100%);
      }

      .story-frame::after {
        border: 1px solid rgba(255, 255, 255, 0.16);
      }

      .story-content {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 100%;
        height: 100%;
        padding: clamp(52px, 7.8vh, 140px) clamp(24px, 6.2vw, 66px) clamp(90px, 12vh, 220px);
        text-align: center;
      }

      .story-kicker {
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
        font-size: clamp(11px, 1.9vh, 18px);
        font-weight: 700;
        line-height: 1.35;
        letter-spacing: 0;
        text-transform: uppercase;
        text-shadow: 0 4px 18px rgba(0, 0, 0, 0.72);
      }

      .story-main {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .story-title {
        margin: 0;
        color: #ffffff;
        font-size: clamp(34px, 6.3vh, 72px);
        font-weight: 760;
        line-height: 1.13;
        letter-spacing: 0;
        word-break: keep-all;
        text-shadow: 0 5px 28px rgba(0, 0, 0, 0.78);
      }

      .story-description {
        max-width: 86%;
        margin: clamp(18px, 2.7vh, 30px) auto 0;
        color: rgba(255, 255, 255, 0.88);
        font-size: clamp(14px, 2vh, 22px);
        font-weight: 550;
        line-height: 1.62;
        word-break: keep-all;
        text-shadow: 0 4px 20px rgba(0, 0, 0, 0.82);
      }

      .story-bottom {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(14px, 2.3vh, 26px);
      }

      .story-schedule {
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: clamp(13px, 1.8vh, 19px);
        font-weight: 650;
        line-height: 1.4;
        word-break: keep-all;
        text-shadow: 0 3px 16px rgba(0, 0, 0, 0.82);
      }

      .story-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: min(78%, 420px);
        min-height: clamp(52px, 7vh, 76px);
        gap: 12px;
        padding: 0 clamp(22px, 5vw, 42px);
        border: 1px solid rgba(255, 255, 255, 0.94);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.94);
        color: #07090d;
        font-size: clamp(15px, 2.1vh, 22px);
        font-weight: 800;
        line-height: 1;
        text-decoration: none;
        box-shadow: 0 16px 42px rgba(0, 0, 0, 0.38);
      }

      .story-primary svg {
        width: clamp(17px, 2.4vh, 24px);
        height: clamp(17px, 2.4vh, 24px);
        flex: 0 0 auto;
      }

      @media (max-aspect-ratio: 9 / 16) {
        .story-frame {
          width: 100vw;
          height: calc(100vw * 16 / 9);
        }
      }

      @media (min-aspect-ratio: 9 / 16) {
        .story-frame {
          width: calc(100dvh * 9 / 16);
          height: 100dvh;
        }
      }
    </style>
    <script src="../../../data/site-data.js?v=20260616-1"></script>
  </head>
  <body>
    <main class="story-stage" aria-label="NURA 발사대회 참관 스토리">
      <article class="story-frame">
        <img class="story-image" src="../../../source/resources/launch.jpg" alt="발사대회 전경" loading="eager" decoding="async" />
        <div class="story-content">
          <p class="story-kicker" data-story-eyebrow>2026 NURA LAUNCH DAY</p>
          <div class="story-main">
            <h1 class="story-title" data-story-title>발사대회의 뜨거운 현장을 가까이서 경험해보세요</h1>
            <p class="story-description" data-story-description>
              NURA 전국대학교로켓발사대회의 생생한 순간을 직접 참관할 수 있습니다. 대학생들의 땀과 열정이 담긴 로켓이 하늘로 솟아오르는 감동을 함께 나누어보세요.
            </p>
          </div>
          <div class="story-bottom">
            <p class="story-schedule" data-story-schedule>일정 및 장소 추후 공개</p>
            <a class="story-primary" href="../apply/" data-story-link>
              <span data-story-cta>참관 신청하기</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                <path d="M5 12h14M13 6l6 6-6 6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </a>
          </div>
        </div>
      </article>
    </main>

    <script>
      (function () {
        const config = window.NURA_DATA && window.NURA_DATA.launchVisitModal;
        if (!config) return;

        const basePath = "../../..";
        const withBasePath = (path) => {
          if (!path || /^(https?:|mailto:|tel:|#|\/)/.test(path)) return path;
          return path.replace(/^\.\//, `${basePath}/`);
        };

        const setText = (selector, value) => {
          const element = document.querySelector(selector);
          if (element && value) element.textContent = value;
        };

        setText("[data-story-eyebrow]", config.eyebrow);
        setText("[data-story-title]", config.title);
        setText("[data-story-schedule]", config.schedule);
        setText("[data-story-cta]", config.ctaLabel);

        const description = document.querySelector("[data-story-description]");
        if (description) {
          description.textContent = `NURA 전국대학교로켓발사대회의 생생한 순간을 직접 참관할 수 있습니다. ${config.description || ""}`.trim();
        }

        const image = document.querySelector(".story-image");
        if (image && config.image) image.src = withBasePath(config.image);

        const link = document.querySelector("[data-story-link]");
        if (link && config.href) link.href = withBasePath(config.href);
      })();
    </script>
  </body>
</html>
