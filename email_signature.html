<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NURA 공식 이메일 템플릿</title>
  <style type="text/css">
    /* 스마트폰(모바일) 환경을 위한 반응형 CSS */
    @media only screen and (max-width: 600px) {
      /* 테이블 너비를 화면에 맞게 100%로 변경 */
      .mobile-full-width {
        width: 100% !important;
        max-width: 100% !important;
      }
      /* 가로로 배치된 요소를 세로로 떨어뜨림 (스태킹) */
      .mobile-stack {
        display: block !important;
        width: 100% !important;
        padding-right: 0 !important;
        padding-left: 0 !important;
        text-align: left !important;
      }
      /* 여백 축소 */
      .mobile-padding {
        padding: 20px 20px !important;
      }
      /* 구분선 여백 등 세부 조정 */
      .mobile-margin-bottom {
        padding-bottom: 20px !important;
      }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f9f9f9; -webkit-font-smoothing: antialiased;">

  <!-- 전체 이메일 배경 -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f9f9f9; margin: 0; padding: 40px 0;">
    <tr>
      <td align="center" style="padding: 0 15px;">

            </td>
          </tr>
          <!-- =================================================== -->

            </td>
          </tr>

          <tr>
            <td style="padding: 50px 32px; text-align: left; font-size: 15px; line-height: 1.7; color: #333333;" class="mobile-padding">
              <!-- 본문 내용 작성부 -->
              <div style="color: #999999; text-align: left; padding: 0;">
                여기에 이메일 내용을 작성하세요.<br>
                <span style="font-size: 13px;">(이 회색 텍스트를 지우고 작성하시면 됩니다)</span>

            </td>

          <!-- =================================================== -->

                  <td width="268" valign="top" class="mobile-stack mobile-margin-bottom" style="padding-right: 16px; padding-bottom: 30px; text-align: left;">

                    <h4 style="margin: 0 0 12px 0; font-size: 14px; font-weight: 700; color: #333333;">사업자 정보</h4>
                    <p style="margin: 0 0 6px 0; font-size: 13px; color: #666666;">대표자: 전하상</p>
