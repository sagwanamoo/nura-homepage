<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NURA | About</title>
    <link rel="icon" type="image/png" sizes="16x16" href="../source/resources/favicon-16x16.png" />
    <link rel="shortcut icon" type="image/png" href="../source/resources/favicon-32x32.png" />

    <style>
  .history-side-panel {
    position: relative;
  }

  .history-summary-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1rem;
  }

  .history-stat-card,
  .history-dial-wrap {
    border: 1px solid rgba(255, 255, 255, 0.10);
    background: rgba(255, 255, 255, 0.045);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .history-stat-card {
    border-radius: 1.35rem;
    padding: 1.25rem;
  }

  .history-dial-wrap {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(180px, 250px);
    gap: 1.25rem;
    align-items: center;
    border-radius: 1.5rem;
    padding: 1.15rem;
  }

  .history-dial-copy {
    min-width: 0;
  }

  .history-dial-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.48);
  }

  .history-dial-description {
    margin-top: 0.55rem;
    font-size: 0.92rem;
    line-height: 1.65;
    color: rgba(255, 255, 255, 0.62);
    word-break: keep-all;
  }

  .history-dial {
    position: relative;
    width: 100%;
    max-width: 250px;
    height: 112px;
    overflow: hidden;
    border-radius: 1.1rem;
    background: rgba(0, 0, 0, 0.28);
  }

 .history-dial::before,
.history-dial::after {
  content: "";
  position: absolute;
  inset-inline: 0;
  height: 2rem;
  z-index: 10;
  pointer-events: none;
}

.history-dial::before {
  top: 0;
  background: linear-gradient(
    to bottom,
    rgba(3, 7, 18, 0.96) 0%,
    rgba(3, 7, 18, 0.72) 45%,
    rgba(3, 7, 18, 0) 100%
  );
}

.history-dial::after {
  bottom: 0;
  background: linear-gradient(
    to top,
    rgba(3, 7, 18, 0.96) 0%,
    rgba(3, 7, 18, 0.72) 45%,
    rgba(3, 7, 18, 0) 100%
  );
}

  .history-dial-focus {
    position: absolute;
    inset-inline: 1rem;
    top: 50%;
    transform: translateY(-50%);
    height: 1px;
    background: rgba(96, 165, 250, 0.45);
    z-index: 11;
  }

  .history-year-reel {
    position: absolute;
    inset-inline: 0;
    transition: transform 480ms cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }

  .history-year-item,
#history-current-year {
  font-family: "Pretendard", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1, "lnum" 1;
  -webkit-font-smoothing: antialiased;
  text-rendering: geometricPrecision;
}

.history-year-item {
  height: 112px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(2.25rem, 5vw, 4rem); /* 일반년도 작게 */
  font-weight: 700;
  letter-spacing: -0.02em;
  color: rgba(255, 255, 255, 0.16);
  opacity: 0.52;
  transform: none;
  transition:
    color 300ms ease,
    opacity 300ms ease,
    text-shadow 300ms ease,
    font-size 300ms ease;
  user-select: none;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.history-year-item.is-active {
  color: rgb(147 197 253);
  opacity: 1;
  text-shadow: 0 0 22px rgba(96, 165, 250, 0.18);
}
  .history-rail {
    position: relative;
    padding-left: 2.25rem;
  }

  .history-rail::before {
    content: "";
    position: absolute;
    left: 0.653rem;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(96, 165, 250, 0.35);
  }

  .history-entry {
    position: relative;
    scroll-margin-top: 8rem;
    transition:
      transform 260ms ease,
      border-color 260ms ease,
      background 260ms ease,
      box-shadow 260ms ease;
  }

  .history-entry::before {
    content: "";
    position: absolute;
    left: -2rem;
    top: 2.2rem;
    width: 0.75rem;
    height: 0.75rem;
    border-radius: 9999px;
    background: rgb(96 165 250);
    box-shadow: 0 0 0 8px rgba(59, 130, 246, 0.1);
  }

  .history-entry.is-active {
    transform: none;
    border-color: rgba(96, 165, 250, 0.28);
    background: transparent;
    box-shadow: none;
  }

  .history-entry.is-active .history-entry-year {
  border-color: rgba(96, 165, 250, 0.3);
  color: rgb(191 219 254);
}

  .history-entry-year {
    letter-spacing: -0.06em;
  }

  .history-group-toggle[aria-expanded="false"] {
    margin-bottom: 1rem;
  }

.page-main-title {
  white-space: nowrap;
  font-size: clamp(2.2rem, 6.4vw, 4.5rem);
}

@media (min-width: 1024px) and (max-width: 1380px) {
  .page-main-title {
    font-size: clamp(2rem, 5.2vw, 4rem);
  }
}

@media (max-width: 430px) {
  .page-main-title {
    font-size: clamp(1.75rem, 8.8vw, 2.3rem);
  }
}

  @media (min-width: 768px) {
    .history-group-toggle[aria-expanded="false"] {
      margin-bottom: 1.25rem;
    }
  }

  @media (max-width: 1023px) {
    .history-side-panel {
      position: static;
    }

    .history-dial-wrap {
      position: fixed;
      left: 50%;
      bottom: max(0.85rem, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(100% - 1.4rem, 238px);
      z-index: 40;
      margin-top: 0;
      padding: 0.8rem 0.8rem 0.9rem;
      display: block;
      border-radius: 1.25rem;
      box-shadow: 0 12px 28px rgba(2, 6, 23, 0.28);
    }

    .history-summary-grid {
      gap: 0.75rem;
    }

    .history-stat-card {
      border-radius: 1.15rem;
      padding: 1rem;
    }

    .history-dial-copy {
      margin-bottom: 0.65rem;
    }

    .history-dial-description {
      display: none;
    }

    .history-dial-wrap .history-dial {
      max-width: none;
    }

    #history {
      padding-bottom: 4rem;
    }

    .history-dial {
      max-width: 194px;
      height: 84px;
    }

    .history-year-item {
  height: 84px;
  font-size: 2.28rem;
}

    .history-rail {
      padding-left: 1.75rem;
    }

    .history-entry::before {
      left: -1.55rem;
    }
  }

  @media (max-width: 1023px) {
    .history-dial-wrap {
      display: none !important;
      position: static !important;
      transform: none !important;
    }

    #history {
      padding-bottom: 0 !important;
    }

    #history > .relative {
      padding-bottom: 1.75rem !important;
    }

    #history > .relative > .grid {
      gap: 1.5rem !important;
    }

    .history-side-panel > section {
      padding-bottom: 1.25rem !important;
    }

    .history-summary-grid {
      gap: 0.75rem !important;
      margin-top: 1.5rem !important;
    }

    .history-stat-card {
      border-radius: 1rem !important;
      padding: 1rem !important;
    }

    .history-rail {
      margin-top: 0.5rem;
      padding-left: 1.75rem;
    }

    .history-entry {
      padding-top: 1.35rem !important;
      padding-bottom: 1.35rem !important;
      scroll-margin-top: 5rem;
    }

    .history-entry::before {
      left: -1.55rem;
      top: 1.85rem;
    }

    .history-entry-year {
      font-size: 1.55rem !important;
    }

    .history-entry p {
      font-size: 0.95rem !important;
      line-height: 1.6 !important;
    }
  }

 </style>

<main class="w-full flex-1 flex flex-col">
<section id="history" class="relative border-t border-white/10 bg-black">

      <aside class="history-side-panel lg:sticky lg:top-12">
        <section class="px-0 md:px-2 lg:px-4 pt-12 md:pt-16 pb-6 md:pb-8 border-b border-white/10">
  <div class="max-w-5xl min-w-0">
<h1 class="page-main-title min-w-0 mt-5 leading-none tracking-[-0.06em] font-bold text-white">
  NURA의 전체 연혁
</h1>
            <p class="mt-6 text-gray-300 text-base md:text-lg leading-8">
NURA는 국내 대학 간 로켓 관련 학술 교류를 촉진하고 정기적인 로켓발사대회를 개최하여 로켓에 관한 대학생들의 관심과 접근성을 고취하고자 설립되었습니다. 
      </p>

        <div class="history-summary-grid mt-10">
          <div class="history-stat-card">
            <div class="text-xs uppercase tracking-[0.18em] text-gray-400">Founded from</div>
            <div class="mt-2 text-3xl font-black tracking-[-0.04em] text-white">1992</div>
          </div>
          <div class="history-stat-card">
            <div class="text-xs uppercase tracking-[0.18em] text-gray-400">Current</div>
<div id="history-current-year" class="mt-2 text-3xl font-black tracking-[-0.04em] text-white"></div>
          </div>
        </div>

        <div class="history-dial-wrap mt-8">
          <div class="history-dial-copy">
            <div class="history-dial-label">Timeline Focus</div>
            <p class="history-dial-description">1992년부터 현재까지</p>
          </div>
          <div class="history-dial">
            <div class="history-dial-focus"></div>
            <div id="history-year-reel" class="history-year-reel"></div>

  </div>

      <div class="history-rail">
  <div id="history-start-spacer" aria-hidden="true"></div>
  <div id="history-entry-list" class="space-y-0"></div>
  <div id="history-end-spacer" aria-hidden="true"></div>
</div>
    </div>
  </div>
</section>


<script>
  const historyData = window.NURA_DATA?.historyData || [];

function createHistoryEntry(entry) {
  const yearClass = "text-[28px] md:text-[40px] font-bold tracking-[-0.05em] text-white";
  const itemTextClass = "text-gray-300 text-[15px] md:text-[17px] leading-7 md:leading-8";

  const itemsHtml = entry.items
    .map((item) => `<p class="${itemTextClass}">${item}</p>`)
    .join("");

  return `
    <article
      class="history-entry w-full border-y border-white/10 py-7 md:py-10"
      data-year="${entry.year}"
    >
      <div class="grid grid-cols-1 md:grid-cols-[120px_minmax(0,1fr)] gap-4 md:gap-8 items-start">
        <div class="history-entry-year ${yearClass}">
          ${entry.year}
        </div>

        <div class="min-w-0 space-y-2 md:space-y-2.5">
          ${itemsHtml}
        </div>
      </div>
    </article>
  `;
}


function buildHistoryGroups(data) {
  const groups = [];
  let currentGroup = null;

  data.forEach((entry) => {
    if (entry.featured) {
      if (currentGroup) groups.push(currentGroup);
      currentGroup = {
        featured: entry,
        children: []
      };
    } else if (currentGroup) {
      currentGroup.children.push(entry);
    } else {
      groups.push({
        featured: null,
        children: [entry]
      });
    }
  });

  if (currentGroup) groups.push(currentGroup);

  return groups
    .map((group, index) => {
      if (!group.featured) {
        return group.children.map(createHistoryEntry).join("");
      }

      const childHtml = group.children.map(createHistoryEntry).join("");
      const hasChildren = group.children.length > 0;
      const panelId = `history-group-panel-${index}`;

      return `
        <section class="history-group space-y-4" data-featured-year="${group.featured.year}">
          ${createHistoryEntry(group.featured)}

          ${
            hasChildren
              ? `
              <div class="pl-0 md:pl-6">
                <button
                  type="button"
class="history-group-toggle inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-4 py-2 text-sm text-gray-200 hover:bg-white/10 transition"                  data-target="${panelId}"
                  aria-expanded="false"
                  aria-controls="${panelId}"
                >
                  <span class="toggle-label">세부 연혁 열기</span>
                </button>
              </div>

              <div id="${panelId}" class="history-group-panel history-group-panel--compact" hidden>
                ${childHtml}
              </div>
            `
              : ""
          }
        </section>
      `;
    })
    .join("");
}

  (function renderHistoryDialTimeline() {
    const reel = document.getElementById("history-year-reel");
    const list = document.getElementById("history-entry-list");
    const currentYearEl = document.getElementById("history-current-year");
    const endSpacer = document.getElementById("history-end-spacer");
    const dial = document.querySelector(".history-dial");
    const historySection = document.getElementById("history");

    if (!reel || !list || !dial || !historySection) return;

    list.innerHTML = buildHistoryGroups(historyData);

const entryYears = historyData.map((entry) => entry.year);
const startYear = Math.min(...entryYears);
const endYear = Math.max(...entryYears);
const years = [];

for (let year = startYear; year <= endYear; year += 1) {
  years.push(year);
}

reel.innerHTML = years
  .map((year) => `<div class="history-year-item" data-year="${year}">${year}</div>`)
  .join("");

    const yearItems = Array.from(reel.querySelectorAll(".history-year-item"));
    const entries = Array.from(list.querySelectorAll(".history-entry"));

function getVisibleEntries() {
  return entries.filter((entry) => {
    const hiddenPanel = entry.closest(".history-group-panel[hidden]");
    return !hiddenPanel;
  });
}

    list.addEventListener("click", (event) => {
  const button = event.target.closest(".history-group-toggle");
  if (!button) return;

  const panelId = button.dataset.target;
  const panel = document.getElementById(panelId);
  if (!panel) return;

  const isOpen = !panel.hidden;
  requestAnimationFrame(() => {
  updateEndSpacerPrecise();
  updateStartSpacerPrecise();
  syncFromScroll();
});
  panel.hidden = isOpen;

  button.setAttribute("aria-expanded", String(!isOpen));
  const label = button.querySelector(".toggle-label");
  if (label) {
    label.textContent = isOpen ? "세부 연혁 열기" : "세부 연혁 닫기";
  }

  requestAnimationFrame(() => {
    updateEndSpacerPrecise();
    syncFromScroll();
  });
});

    let introRunning = false;
    let introRaf = null;

    function getYearItemHeight() {
      const first = yearItems[0];
      return first ? first.offsetHeight : 112;
    }

    function getDialCenterYViewport() {
      const rect = dial.getBoundingClientRect();
      return rect.top + rect.height / 2 - 300;
    }

    function getMaxScrollY() {
      return Math.max(document.documentElement.scrollHeight - window.innerHeight, 0);
    }

    function clampScrollY(value) {
      return Math.min(Math.max(value, 0), getMaxScrollY());
    }

    const REAL_CURRENT_YEAR = new Date().getFullYear();

function setCurrentYearText() {
  if (currentYearEl) currentYearEl.textContent = String(REAL_CURRENT_YEAR);
}
    function setReelPositionByYear(yearValue) {
      const itemHeight = getYearItemHeight();
      const dialHeight = dial.clientHeight;
      const indexFloat = yearValue - startYear;
      const offset = dialHeight / 2 - itemHeight / 2 - indexFloat * itemHeight;
      reel.style.transform = `translate3d(0, ${offset}px, 0)`;
    }

    function setActiveYear(year) {
      const numericYear = Number(year);
      if (!years.includes(numericYear)) return;

      setReelPositionByYear(numericYear);
      setCurrentYearText();

      yearItems.forEach((item) => {
        item.classList.toggle("is-active", Number(item.dataset.year) === numericYear);
      });

      entries.forEach((entry) => {
        entry.classList.toggle("is-active", Number(entry.dataset.year) === numericYear);
      });
    }

  function getTargetScrollForEntry(entry) {
  const rect = entry.getBoundingClientRect();
  const entryCenterInDocument = window.scrollY + rect.top + rect.height / 2;
  return entryCenterInDocument - getActivationCenterY();
}

function updateStartSpacerPrecise() {
  const startSpacer = document.getElementById("history-start-spacer");
  if (!startSpacer || !entries.length) return;

  startSpacer.style.height = window.innerWidth >= 1024 ? "56px" : "0px";
}

function updateEndSpacerPrecise() {
  if (!endSpacer || !entries.length) return;

  endSpacer.style.height = "0px";

  const visibleEntries = getVisibleEntries();
  if (!endSpacer || !visibleEntries.length) return;

  endSpacer.style.height = "0px";

  const lastEntry = visibleEntries[visibleEntries.length - 1];
  const rawTargetScroll = getTargetScrollForEntry(lastEntry);
  const currentMaxScroll = getMaxScrollY();
  const extraNeeded = Math.max(rawTargetScroll - currentMaxScroll, 0);

  endSpacer.style.height = `${Math.ceil(
    extraNeeded + (window.innerWidth >= 1024 ? 24 : 0)
  )}px`;
}

  function getActivationCenterY() {
  return window.innerWidth >= 1024 ? window.innerHeight / 2 - 130 : window.innerHeight / 2 - 56;
}

function syncFromScroll() {
  const visibleEntries = getVisibleEntries();
  if (!visibleEntries.length) return;

  const firstEntry = visibleEntries[0];
  const lastEntry = visibleEntries[visibleEntries.length - 1];
  const maxScrollY = getMaxScrollY();

  // 맨 위에서는 첫 카드 강제 활성화
  if (window.scrollY <= 40) {
    setActiveYear(firstEntry.dataset.year);
    return;
  }

  // 맨 아래에서는 마지막 카드 강제 활성화
  if (maxScrollY - window.scrollY <= 450) {
    setActiveYear(lastEntry.dataset.year);
    return;
  }

  const activationCenterY = getActivationCenterY();
  let closestEntry = null;
  let closestDistance = Infinity;

  visibleEntries.forEach((entry) => {
    const rect = entry.getBoundingClientRect();
    const entryCenterY = rect.top + rect.height / 2;
    const distance = Math.abs(entryCenterY - activationCenterY);

    if (distance < closestDistance) {
      closestDistance = distance;
      closestEntry = entry;
    }
  });

  if (closestEntry) {
    setActiveYear(closestEntry.dataset.year);
  }
}

    function handleScroll() {
      if (introRunning) return;
      syncFromScroll();
    }

    function handleResize() {
      updateEndSpacerPrecise();
      updateStartSpacerPrecise();
    }

    setActiveYear(startYear);
    updateEndSpacerPrecise();
    updateStartSpacerPrecise();

    window.addEventListener("scroll", handleScroll, { passive: true });
    window.addEventListener("resize", handleResize);
    window.addEventListener("load", handleResize);

  })();
</script>
