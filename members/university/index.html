            <section class="px-0 md:px-2 lg:px-4 py-8 md:py-10">
              <div class="grid grid-cols-1 lg:grid-cols-[minmax(0,0.95fr)_minmax(360px,0.9fr)] gap-8 lg:gap-10 items-start">
                <div class="min-w-0 members-map-panel">
                  <div class="map-graphic">
                    <div id="members-map-status" class="map-status">대한민국 지도를 불러오는 중입니다.</div>
                    <div
                      id="members-korea-map"
                      class="korea-map-frame"
                      data-map-src="../../source/members/south-korea.svg?v=20260615-east-sea-inset-top-right"
                      role="group"
                      aria-label="대한민국 회원 대학 지도"
                    ></div>
                  </div>
                </div>

                <div class="min-w-0">
                  <div class="members-region-column max-w-[440px] ml-auto">
                    <div id="members-guide-block" class="members-guide-block">
                      <p class="text-xl md:text-2xl font-bold tracking-[-0.03em] text-white">권역별 회원 대학</p>
                      <p class="mt-1 text-sm md:text-[15px] leading-7 text-white/55 break-keep">
                        지도를 보며 권역을 살펴보고, 오른쪽 목록에서 세부 권역과 회원 대학 정보를 확인할 수 있습니다.
                      </p>
                    </div>
                    <div id="region-accordion" class="region-accordion"></div>
                  </div>
                </div>
              </div>
            </section>

            <section class="px-0 md:px-2 lg:px-4 pt-2 md:pt-4 pb-8 md:pb-10 border-t border-white/10">
              <div class="members-directory-shell">
                <section class="members-logo-wall" aria-labelledby="members-logo-wall-title">
                  <div class="members-logo-wall__meta">
                    <p id="members-logo-wall-title" class="members-logo-wall__title">회원 대학 로고</p>
                  </div>
                  <div id="members-logo-grid" class="members-logo-grid"></div>
                </section>
              </div>
            </section>
          </div>
        </section>
      </main>
      <div data-shared-footer></div>
    </div>

    <script>
      const memberOrganizations = Array.isArray(window.NURA_DATA?.memberOrganizations) ? window.NURA_DATA.memberOrganizations : [];
      const memberRegions = Array.isArray(window.NURA_DATA?.memberRegions) ? window.NURA_DATA.memberRegions : [];
      const memberCount = window.NURA_DATA?.overviewStats?.find((item) => item.label === '참여 대학')?.value || 38;
      const memberTotalCount = document.getElementById('member-total-count');
      const mapFrame = document.getElementById('members-korea-map');
      const mapStatus = document.getElementById('members-map-status');
      const membersGuideBlock = document.getElementById('members-guide-block');
      const regionAccordion = document.getElementById('region-accordion');
      const memberLogoGrid = document.getElementById('members-logo-grid');

      const provinceGroupsByRegion = {
        seoul: ['KR-11'],
        incheon: ['KR-28'],
        gyeonggi: ['KR-41'],
        gangwon: ['KR-42'],
        daejeon: ['KR-30'],
        sejong: ['KR-50'],
        chungbuk: ['KR-43'],
        chungnam: ['KR-44'],
        jeonbuk: ['KR-45'],
        // KR-46 is the merged Gwangju + Jeonnam launch map for 2026-07-01.
        jeonnam: ['KR-46'],
        daegu: ['KR-27'],
        gyeongbuk: ['KR-47'],
        busan: ['KR-26'],
        ulsan: ['KR-31'],
        gyeongnam: ['KR-48'],
        jeju: ['KR-49']
      };

      const macroRegions = [
        {
          id: 'capital',
          name: '수도권',
          coverage: '서울 · 인천 · 경기',
          description: '서울, 인천, 경기 지역의 회원 대학을 함께 보고, 안에서 세부 지역별로 나누어 확인할 수 있습니다.',
          regions: ['seoul', 'incheon', 'gyeonggi']
        },
        {
          id: 'gangwon',
          name: '강원권',
          coverage: '강원',
          description: '강원 지역 회원 대학입니다.',
          regions: ['gangwon']
        },
        {
          id: 'chungcheong',
          name: '충청권',
          coverage: '대전 · 세종 · 충북 · 충남',
          description: '충청권은 대전, 세종, 충북, 충남으로 나누어 회원 대학을 정리했습니다.',
          regions: ['daejeon', 'sejong', 'chungbuk', 'chungnam']
        },
        {
          id: 'honam',
          name: '호남권',
          coverage: '전남광주통합특별시 · 전북',
          description: '호남권은 전남광주통합특별시와 전북으로 구분해 회원 대학을 확인할 수 있습니다.',
          regions: ['jeonnam', 'jeonbuk']
        },
        {
          id: 'yeongnam',
          name: '영남권',
          coverage: '대구 · 경북 · 부산 · 울산 · 경남',
          description: '영남권은 대구, 경북, 부산, 울산, 경남으로 나누어 회원 대학을 정리했습니다.',
          regions: ['daegu', 'gyeongbuk', 'busan', 'ulsan', 'gyeongnam']
        },
        {
          id: 'jeju',
          name: '제주권',
          coverage: '제주',
          description: '제주 지역 회원 대학입니다.',
          regions: ['jeju']
        }
      ];

      const provinceMacroRegionMap = new Map(
        macroRegions.flatMap((macroRegion) =>
          macroRegion.regions.flatMap((regionId) =>
            (provinceGroupsByRegion[regionId] || []).map((provinceId) => [provinceId, macroRegion.id])
          )
        )
      );

      const provinceFineRegionMap = new Map(
        Object.entries(provinceGroupsByRegion).flatMap(([regionId, provinceIds]) =>
          (provinceIds || []).map((provinceId) => [provinceId, regionId])
        )
      );

      const regionDefinitionMap = new Map(memberRegions.map((region) => [region.id, region]));
      const regionMembersMap = new Map(memberRegions.map((region) => [region.id, []]));

      const MAP_BASE_FILL = 'rgba(255,255,255,0.095)';
      const MAP_BASE_STROKE = 'rgba(255,255,255,0.3)';
      const MAP_HOVER_FILL = 'rgba(96,165,250,0.10)';
      const MAP_HOVER_STROKE = 'rgba(147,197,253,0.72)';
      const MAP_INTERACTIVE_FILL = 'rgba(255,255,255,0.14)';
      const MAP_INTERACTIVE_STROKE = 'rgba(191,219,254,0.94)';
      const MAP_SELECTED_FILL = 'rgba(96,165,250,0.18)';
      const MAP_SELECTED_STROKE = 'rgba(191,219,254,1)';

      const memberLogoPathByName = {
        '가천대학교': '../../source/members/used-logos/가천대학교.png',
        '건국대학교': '../../source/members/used-logos/건국대학교.png',
        '경기대학교': '../../source/members/used-logos/경기대학교.png',
        '경북대학교': '../../source/members/used-logos/경북대학교.png',
        '경상국립대학교': '../../source/members/used-logos/경상국립대학교.png',
        '경희대학교': '../../source/members/used-logos/경희대학교.png',
        '고려대학교': '../../source/members/used-logos/고려대학교.gif',
        '공군사관학교': '../../source/members/used-logos/공군사관학교.svg',
        '광주과학기술원': '../../source/members/used-logos/광주과학기술원.png',
        '국립순천대학교': '../../source/members/used-logos/국립순천대학교.png',
        '국립한국교통대학교': '../../source/members/used-logos/국립한국교통대학교.png',
        '국민대학교': '../../source/members/used-logos/국민대학교.png',
        '대구경북과학기술원': '../../source/members/used-logos/디지스트.png',
        '동국대학교': '../../source/members/used-logos/동국대학교.png',
        '부산대학교': '../../source/members/used-logos/부산대학교.png',
        '서울과학기술대학교': '../../source/members/used-logos/서울과학기술대학교.svg',
        '서울대학교': '../../source/members/used-logos/서울대학교.svg',
        '서울시립대학교': '../../source/members/used-logos/서울시립대.png',
        '성균관대학교': '../../source/members/used-logos/성균관대학교.png',
        '세종대학교': '../../source/members/used-logos/세종대학교.png',
        '숙명여자대학교': '../../source/members/used-logos/숙명여자대학교.png',
        '숭실대학교': '../../source/members/used-logos/숭실대학교.svg',
        '아주대학교': '../../source/members/used-logos/아주대학교.svg',
        '연세대학교': '../../source/members/used-logos/연세대학교.png',
        '영남대학교': '../../source/members/used-logos/영남대학교.png',
        '울산과학기술원': '../../source/members/used-logos/unist.svg',
        '인하대학교': '../../source/members/used-logos/인하대학교.png',
        '전북대학교': '../../source/members/used-logos/전북대학교.png',
        '조선대학교': '../../source/members/used-logos/조선대학교.jpg',
        '중앙대학교': '../../source/members/used-logos/중앙대학교.png',
        '충남대학교': '../../source/members/used-logos/충남대학교.svg',
        '포항공과대학교': '../../source/members/used-logos/포항공대.png',
        '한국과학기술원': '../../source/members/used-logos/한국과학기술원.png',
        '한국기술교육대학교': '../../source/members/used-logos/한국기술교육대학교.svg',
        '한국에너지공과대학교': '../../source/members/used-logos/한국에너지공과대학교.png',
        '한국항공대학교': '../../source/members/used-logos/항공대학교.svg',
        '한양대학교': '../../source/members/used-logos/한양대학교.svg',
        '한양대학교 ERICA': '../../source/members/used-logos/한양대학교 ERICA.svg'
      };

      let provinceNodes = [];
      let mapOverlayNodes = [];
      let svgRootNode = null;
      let originalMapViewBox = '';
      let activeMacroRegionId = null;
      let selectedProvinceId = null;
      let hoveredProvinceId = null;
      let hoveredMacroRegionId = null;
      let isRegionPanelOpen = false;
      let hasPinnedRegionSelection = false;
      const openSubregionByMacro = new Map(
        macroRegions.map((macroRegion) => [macroRegion.id, null])
      );

      if (memberTotalCount) {
        memberTotalCount.textContent = String(memberCount);
      }

      memberOrganizations.forEach((member) => {
        if (!member.region) return;
        if (!regionMembersMap.has(member.region)) {
          regionMembersMap.set(member.region, []);
        }
        regionMembersMap.get(member.region).push(member);
      });

      const getMembersByFineRegion = (regionId) => regionMembersMap.get(regionId) || [];

      const getInstagramUrl = (member) => {
        const instagramHandle = typeof member.instagramHandle === 'string' ? member.instagramHandle.trim() : '';
        const normalizedInstagramHandle = instagramHandle
          ? (instagramHandle.startsWith('@') ? instagramHandle : `@${instagramHandle}`)
          : '';

        return normalizedInstagramHandle
          ? `https://www.instagram.com/${normalizedInstagramHandle.slice(1)}/`
          : member.instagram || '';
      };

      const getWebsiteUrl = (member) => {
        if (member.website) return member.website;
        return '';
      };

      const getPrimaryLink = (member) => {
        const preferredLink = typeof member.primaryLink === 'string' ? member.primaryLink.trim().toLowerCase() : '';
        const websiteUrl = getWebsiteUrl(member);
        const instagramUrl = getInstagramUrl(member);

        if (preferredLink === 'website' && websiteUrl) {
          return { url: websiteUrl, label: 'Website' };
        }

        if (preferredLink === 'instagram' && instagramUrl) {
          return { url: instagramUrl, label: 'Instagram' };
        }

        if (instagramUrl) {
          return { url: instagramUrl, label: 'Instagram' };
        }

        if (websiteUrl) {
          return { url: websiteUrl, label: 'Website' };
        }

        return { url: '', label: '' };
      };

      const renderLogoWall = () => {
        if (!memberLogoGrid) return;

        memberLogoGrid.innerHTML = memberOrganizations
          .map((member) => {
            const primaryLink = getPrimaryLink(member);
            const logoPath = memberLogoPathByName[member.name] || '';
            const encodedLogoPath = logoPath ? encodeURI(logoPath) : '';
            const tagName = primaryLink.url ? 'a' : 'div';
            const logoImageClassByName = {
              '대구경북과학기술원': 'members-logo-item__image--dgist',
              '서울시립대학교': 'members-logo-item__image--uos'
            };
            const imageClassName = logoImageClassByName[member.name] || '';
            const imageClassAttr = imageClassName ? ` class="${imageClassName.trim()}"` : '';
            const hrefAttrs = primaryLink.url
              ? ` href="${primaryLink.url}" target="_blank" rel="noopener noreferrer" aria-label="${member.name} ${primaryLink.label} 열기"`
              : '';

            return `
              <${tagName} class="members-logo-item" title="${member.name}"${hrefAttrs}>
                ${encodedLogoPath
                  ? `<img${imageClassAttr} src="${encodedLogoPath}" alt="${member.name} 로고" decoding="async">`
                  : `<span class="members-logo-item__fallback">${member.name}</span>`}
              </${tagName}>
            `;
          })
          .join('');
      };

      const getMacroRegionCount = (macroRegionId) => {
        const macroRegion = macroRegions.find((item) => item.id === macroRegionId);
        if (!macroRegion) return 0;
        return macroRegion.regions.reduce((total, regionId) => total + getMembersByFineRegion(regionId).length, 0);
      };

      const getMacroRegionCountLabel = (macroRegionId) => {
        return memberOrganizations.length ? `${getMacroRegionCount(macroRegionId)}개` : '준비중';
      };

      const getProvinceIdByFineRegion = (regionId) => (provinceGroupsByRegion[regionId] || [])[0] || null;

      const getMemberListHtml = (regionId) => {
        const members = getMembersByFineRegion(regionId);

        if (!members.length) {
          return `<p class="member-entry__empty break-keep">등록된 회원 대학 정보가 아직 없습니다.</p>`;
        }

        return members
          .map((member) => {
            const instagramHandle = typeof member.instagramHandle === 'string' ? member.instagramHandle.trim() : '';
            const normalizedInstagramHandle = instagramHandle
              ? (instagramHandle.startsWith('@') ? instagramHandle : `@${instagramHandle}`)
              : '';
            const instagramUrl = normalizedInstagramHandle
              ? `https://www.instagram.com/${normalizedInstagramHandle.slice(1)}/`
              : member.instagram;

            const interactiveAttrs = instagramUrl
              ? ` data-member-href="${instagramUrl}" tabindex="0" role="link" aria-label="${member.name} 인스타그램 열기"`
              : '';

            return `
              <article class="member-entry${instagramUrl ? ' member-entry--interactive' : ''}"${interactiveAttrs}>
                <h3 class="member-entry__name">${member.clubName || member.name}</h3>
                <p class="member-entry__meta">
                  ${member.name}
                </p>
                ${member.description ? `<p class="member-entry__meta break-keep">${member.description}</p>` : ''}
              </article>
            `;
          })
          .join('');
      };

      const getOrderedSubregions = (macroRegion) => {
        const openSubregionId = openSubregionByMacro.get(macroRegion.id);
        if (!openSubregionId) return macroRegion.regions;

        return [
          openSubregionId,
          ...macroRegion.regions.filter((regionId) => regionId !== openSubregionId)
        ];
      };

      const getMacroRegionPanelHtml = (macroRegion) => {
        const subregionHtml = getOrderedSubregions(macroRegion)
          .map((regionId) => {
            const region = regionDefinitionMap.get(regionId);
            if (!region) return '';

            const memberCountByRegion = getMembersByFineRegion(regionId).length;
            const isOpen = openSubregionByMacro.get(macroRegion.id) === regionId;
            return `
              <section class="subregion-group ${isOpen ? 'is-active' : ''}">
                <button
                  type="button"
                  class="subregion-group__toggle ${isOpen ? 'is-active' : ''}"
                  data-subregion-toggle="${regionId}"
                  data-parent-region="${macroRegion.id}"
                  aria-expanded="${isOpen}"
                  aria-controls="subregion-panel-${macroRegion.id}-${regionId}"
                >
                  <span class="subregion-group__header">
                    <span class="subregion-group__meta">
                      <span class="subregion-group__name">${region.name}</span>
                      <span class="subregion-group__coverage">${region.coverage}</span>
                    </span>
                    <span class="subregion-group__side">
                      <span class="subregion-group__count">${memberCountByRegion}개</span>
                      <span class="subregion-group__chevron" aria-hidden="true">
                        <svg viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                          <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"></path>
                        </svg>
                      </span>
                    </span>
                  </span>
                </button>
                <div id="subregion-panel-${macroRegion.id}-${regionId}" class="subregion-group__panel" ${isOpen ? '' : 'hidden'}>
                  <div class="member-list-card">
                    ${getMemberListHtml(regionId)}
                  </div>
                </div>
              </section>
            `;
          })
          .join('');

        return `
          <div class="region-panel__description break-keep">${macroRegion.description}</div>
          <div class="subregion-stack">
            ${subregionHtml}
          </div>
        `;
      };

      const getOrderedMacroRegions = () => {
        if (!activeMacroRegionId || !isRegionPanelOpen) return macroRegions;

        const activeMacroRegion = macroRegions.find((item) => item.id === activeMacroRegionId);
        if (!activeMacroRegion) return macroRegions;

        return [
          activeMacroRegion,
          ...macroRegions.filter((item) => item.id !== activeMacroRegionId)
        ];
      };

      const renderRegionAccordion = () => {
        if (!regionAccordion) return;

        regionAccordion.innerHTML = getOrderedMacroRegions()
          .map((macroRegion) => `
            <section class="region-item">
              <button
                type="button"
                class="region-toggle"
                data-region-toggle="${macroRegion.id}"
                aria-expanded="false"
                aria-controls="region-panel-${macroRegion.id}"
              >
                <span class="region-toggle__meta">
                  <span class="region-toggle__name">${macroRegion.name}</span>
                  <span class="region-toggle__coverage">${macroRegion.coverage}</span>
                </span>
                <span class="region-toggle__side">
                  <span class="region-toggle__badge">${getMacroRegionCountLabel(macroRegion.id)}</span>
                  <span class="region-toggle__chevron" aria-hidden="true">
                    <svg viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
                      <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"></path>
                    </svg>
                  </span>
                </span>
              </button>
              <div id="region-panel-${macroRegion.id}" class="region-panel" hidden>
                ${getMacroRegionPanelHtml(macroRegion)}
              </div>
            </section>
          `)
          .join('');

        applySubregionHoverClasses();
      };

      const clearSubregionHoverState = ({ sync = true } = {}) => {
        if (!regionAccordion) return;

        regionAccordion.querySelectorAll('.subregion-group.is-hovered').forEach((element) => {
          element.classList.remove('is-hovered');
        });

        regionAccordion.querySelectorAll('.region-toggle.is-subregion-hovered').forEach((element) => {
          element.classList.remove('is-subregion-hovered');
        });

        hoveredProvinceId = null;

        if (sync) {
          syncActiveState();
        }
      };

      const applySubregionHoverClasses = () => {
        if (!regionAccordion) return;

        regionAccordion.querySelectorAll('.subregion-group.is-hovered').forEach((element) => {
          element.classList.remove('is-hovered');
        });

        regionAccordion.querySelectorAll('.region-toggle.is-subregion-hovered').forEach((element) => {
          element.classList.remove('is-subregion-hovered');
        });

        if (!hoveredProvinceId) return;

        const fineRegionId = provinceFineRegionMap.get(hoveredProvinceId);
        const macroRegionId = provinceMacroRegionMap.get(hoveredProvinceId);
        if (!fineRegionId || !macroRegionId) return;

        const subregionGroup = regionAccordion.querySelector(
          `[data-subregion-toggle="${fineRegionId}"]`
        )?.closest('.subregion-group');
        const parentRegionButton = regionAccordion.querySelector(
          `[data-region-toggle="${macroRegionId}"]`
        );

        subregionGroup?.classList.add('is-hovered');
        parentRegionButton?.classList.add('is-subregion-hovered');
      };

      const setSubregionHoverState = (subregionButton) => {
        if (!regionAccordion) return;

        if (!subregionButton) return;

        const provinceId = getProvinceIdByFineRegion(subregionButton.dataset.subregionToggle);
        hoveredProvinceId = provinceId;
        applySubregionHoverClasses();
        syncActiveState();
      };

      const applyProvinceVisual = (provinceNode, state) => {
        const isSelected = state === 'selected';
        const isHovered = state === 'hovered';
        const isInteractive = state === 'interactive';

        provinceNode.style.fill = isSelected
          ? MAP_SELECTED_FILL
          : isInteractive
            ? MAP_INTERACTIVE_FILL
          : isHovered
            ? MAP_HOVER_FILL
            : MAP_BASE_FILL;
        provinceNode.style.stroke = isSelected
          ? MAP_SELECTED_STROKE
          : isInteractive
            ? MAP_INTERACTIVE_STROKE
          : isHovered
            ? MAP_HOVER_STROKE
            : MAP_BASE_STROKE;
        provinceNode.style.strokeWidth = isInteractive || isSelected ? '1.7' : '1.4';
        provinceNode.style.vectorEffect = 'non-scaling-stroke';
        provinceNode.style.transition = 'fill 180ms ease, stroke 180ms ease, opacity 180ms ease';
        provinceNode.style.cursor = 'pointer';
      };

      const getProvinceVisualPriority = (provinceNode, highlightedMacroRegionId) => {
        if (provinceNode.id === hoveredProvinceId) return 3;
        if (provinceNode.id === selectedProvinceId) return 2;
        if (highlightedMacroRegionId && provinceNode.dataset.regionId === highlightedMacroRegionId) return 1;
        return 0;
      };

      const syncProvinceDrawOrder = (highlightedMacroRegionId) => {
        if (!svgRootNode || !provinceNodes.length) return;

        const orderedProvinceNodes = [...provinceNodes].sort((leftNode, rightNode) => {
          const priorityDiff =
            getProvinceVisualPriority(leftNode, highlightedMacroRegionId) -
            getProvinceVisualPriority(rightNode, highlightedMacroRegionId);

          if (priorityDiff !== 0) return priorityDiff;

          return Number(leftNode.dataset.drawOrder || '0') - Number(rightNode.dataset.drawOrder || '0');
        });

        orderedProvinceNodes.forEach((provinceNode) => {
          svgRootNode.appendChild(provinceNode);
        });

        mapOverlayNodes.forEach((overlayNode) => {
          svgRootNode.appendChild(overlayNode);
        });
      };

      const syncActiveState = () => {
        document.querySelectorAll('[data-region-toggle]').forEach((button) => {
          const isActive = button.dataset.regionToggle === activeMacroRegionId;
          const isHovered = button.dataset.regionToggle === hoveredMacroRegionId;
          const isOpen = isActive && isRegionPanelOpen;
          const panelId = button.getAttribute('aria-controls');
          const panel = panelId ? document.getElementById(panelId) : null;

          button.classList.toggle('is-active', isActive);
          button.classList.toggle('is-hovered', !isActive && isHovered);
          button.setAttribute('aria-expanded', String(isOpen));

          if (panel) {
            panel.hidden = !isOpen;
          }
        });

        const highlightedMacroRegionId = hoveredMacroRegionId || (
          !selectedProvinceId && isRegionPanelOpen ? activeMacroRegionId : null
        );

        provinceNodes.forEach((provinceNode) => {
          const visualState = provinceNode.id === hoveredProvinceId
            ? 'interactive'
            : provinceNode.id === selectedProvinceId
              ? 'selected'
            : highlightedMacroRegionId && provinceNode.dataset.regionId === highlightedMacroRegionId
              ? 'hovered'
              : 'base';

          applyProvinceVisual(provinceNode, visualState);
        });

        syncProvinceDrawOrder(highlightedMacroRegionId);

        if (membersGuideBlock) {
          const shouldHideGuide =
            hasPinnedRegionSelection ||
            Boolean(hoveredMacroRegionId) ||
            Boolean(activeMacroRegionId && isRegionPanelOpen);

          membersGuideBlock.classList.toggle('is-hidden', shouldHideGuide);
        }
      };

      const resetToDefaultState = () => {
        activeMacroRegionId = null;
        selectedProvinceId = null;
        hoveredProvinceId = null;
        hoveredMacroRegionId = null;
        isRegionPanelOpen = false;
        hasPinnedRegionSelection = false;
        macroRegions.forEach((macroRegion) => {
          openSubregionByMacro.set(macroRegion.id, null);
        });
        renderRegionAccordion();
        syncActiveState();
      };

      const setActiveMacroRegion = (macroRegionId, { open = isRegionPanelOpen, resetSubregion = false } = {}) => {
        if (!macroRegions.find((item) => item.id === macroRegionId)) return;

        if (resetSubregion && (activeMacroRegionId !== macroRegionId || !isRegionPanelOpen)) {
          openSubregionByMacro.set(macroRegionId, null);
        }

        activeMacroRegionId = macroRegionId;
        selectedProvinceId = null;
        hoveredProvinceId = null;
        hoveredMacroRegionId = null;
        isRegionPanelOpen = open;
        renderRegionAccordion();
        syncActiveState();
      };

      const toggleRegionPanel = (macroRegionId) => {
        if (!macroRegionId) return;

        if (activeMacroRegionId === macroRegionId) {
          isRegionPanelOpen = !isRegionPanelOpen;
          if (isRegionPanelOpen) {
            openSubregionByMacro.set(macroRegionId, null);
          } else {
            resetToDefaultState();
            return;
          }
          hasPinnedRegionSelection = true;
          selectedProvinceId = null;
          hoveredProvinceId = null;
          hoveredMacroRegionId = null;
          renderRegionAccordion();
          syncActiveState();
        } else {
          hasPinnedRegionSelection = true;
          setActiveMacroRegion(macroRegionId, { open: true, resetSubregion: true });
        }
      };

      const openMacroRegionFromMap = (macroRegionId) => {
        if (!macroRegionId) return;

        const isSameOpenMacroRegion =
          activeMacroRegionId === macroRegionId &&
          isRegionPanelOpen &&
          !selectedProvinceId;

        if (isSameOpenMacroRegion) {
          resetToDefaultState();
          return;
        }

        hasPinnedRegionSelection = true;
        activeMacroRegionId = macroRegionId;
        selectedProvinceId = null;
        hoveredProvinceId = null;
        hoveredMacroRegionId = null;
        isRegionPanelOpen = true;
        openSubregionByMacro.set(macroRegionId, null);
        renderRegionAccordion();
        syncActiveState();
      };

      const previewMapProvince = (provinceId) => {
        const macroRegionId = provinceMacroRegionMap.get(provinceId);
        if (!macroRegionId) return;

        hoveredProvinceId = provinceId;
        applySubregionHoverClasses();

        if (selectedProvinceId) {
          hoveredMacroRegionId = provinceId === selectedProvinceId ? null : macroRegionId;
          syncActiveState();
          return;
        }

        hoveredMacroRegionId = macroRegionId;

        if (activeMacroRegionId !== macroRegionId || !isRegionPanelOpen) {
          activeMacroRegionId = macroRegionId;
          isRegionPanelOpen = true;
          openSubregionByMacro.set(macroRegionId, null);
          renderRegionAccordion();
        }

        syncActiveState();
      };

      const clearHoveredMacroRegion = () => {
        hoveredProvinceId = null;
        applySubregionHoverClasses();

        if (!hoveredMacroRegionId && selectedProvinceId) {
          syncActiveState();
          return;
        }

        if (!hoveredMacroRegionId && hasPinnedRegionSelection) {
          syncActiveState();
          return;
        }
        if (!hoveredMacroRegionId) {
          resetToDefaultState();
          return;
        }
        hoveredMacroRegionId = null;

        if (!selectedProvinceId && !hasPinnedRegionSelection) {
          resetToDefaultState();
          return;
        }

        syncActiveState();
      };

      const isMobileMapInteraction = () => window.matchMedia('(pointer: coarse), (max-width: 767px)').matches;

      const updateMapViewBoxForMobile = () => {
        if (!svgRootNode || !provinceNodes.length) return;

        if (!originalMapViewBox) {
          originalMapViewBox = svgRootNode.getAttribute('viewBox') || '';
        }

        const shouldUseMobileViewBox = window.matchMedia('(max-width: 767px)').matches;
        if (!shouldUseMobileViewBox) {
          if (originalMapViewBox) {
            svgRootNode.setAttribute('viewBox', originalMapViewBox);
          }
          return;
        }

        const provinceBounds = provinceNodes.map((provinceNode) => provinceNode.getBBox());
        const minX = Math.min(...provinceBounds.map((bound) => bound.x));
        const minY = Math.min(...provinceBounds.map((bound) => bound.y));
        const maxX = Math.max(...provinceBounds.map((bound) => bound.x + bound.width));
        const maxY = Math.max(...provinceBounds.map((bound) => bound.y + bound.height));

        const width = maxX - minX;
        const height = maxY - minY;

        if (width <= 0 || height <= 0) return;

        const horizontalPadding = width * 0.035;
        const verticalPadding = height * 0.03;
        svgRootNode.setAttribute(
          'viewBox',
          `${minX - horizontalPadding} ${minY - verticalPadding} ${width + (horizontalPadding * 2)} ${height + (verticalPadding * 2)}`
        );
      };

      const openMapSubregion = (provinceId) => {
        const macroRegionId = provinceMacroRegionMap.get(provinceId);
        const fineRegionId = provinceFineRegionMap.get(provinceId);

        if (!macroRegionId) return;

        const isSameProvinceSelected = selectedProvinceId === provinceId;

        if (isSameProvinceSelected) {
          resetToDefaultState();
          return;
        }

        hasPinnedRegionSelection = true;
        selectedProvinceId = provinceId;
        hoveredProvinceId = null;
        hoveredMacroRegionId = null;
        activeMacroRegionId = macroRegionId;
        isRegionPanelOpen = true;
        openSubregionByMacro.set(macroRegionId, fineRegionId || null);
        renderRegionAccordion();
        syncActiveState();
      };

      const activateProvinceSelection = (provinceNode, macroRegionId) => {
        if (isMobileMapInteraction()) {
          openMacroRegionFromMap(macroRegionId);
          return;
        }

        openMapSubregion(provinceNode.id);
      };

      const bindProvinceEvents = (provinceNode, macroRegionId) => {
        applyProvinceVisual(provinceNode, provinceNode.id === selectedProvinceId ? 'selected' : 'base');
        provinceNode.dataset.regionId = macroRegionId;
        provinceNode.setAttribute('tabindex', '0');
        provinceNode.setAttribute('role', 'button');
        provinceNode.setAttribute('focusable', 'true');
        provinceNode.style.outline = 'none';
        provinceNode.style.touchAction = 'manipulation';
        provinceNode.style.webkitTapHighlightColor = 'transparent';

        const provinceTitle = provinceNode.getAttribute('data-map_title') || provinceNode.dataset.mapTitle || provinceNode.getAttribute('title') || '지역';
        const macroRegionName = macroRegions.find((item) => item.id === macroRegionId)?.name || '권역';
        provinceNode.setAttribute('aria-label', `${provinceTitle} · ${macroRegionName}`);

        let lastTouchActivationAt = 0;

        provinceNode.addEventListener('mousedown', (event) => {
          event.preventDefault();
        });

        provinceNode.addEventListener('pointerup', (event) => {
          if (event.pointerType !== 'touch' && event.pointerType !== 'pen') return;

          event.preventDefault();
          lastTouchActivationAt = Date.now();
          activateProvinceSelection(provinceNode, macroRegionId);
        });

        provinceNode.addEventListener('click', () => {
          if (Date.now() - lastTouchActivationAt < 700) return;
          activateProvinceSelection(provinceNode, macroRegionId);
        });

        provinceNode.addEventListener('mouseenter', () => {
          if (isMobileMapInteraction()) return;
          previewMapProvince(provinceNode.id);
        });

        provinceNode.addEventListener('mouseleave', () => {
          if (isMobileMapInteraction()) return;
          clearHoveredMacroRegion();
        });

        provinceNode.addEventListener('keydown', (event) => {
          if (event.key !== 'Enter' && event.key !== ' ') return;
          event.preventDefault();
          activateProvinceSelection(provinceNode, macroRegionId);
        });

        provinceNode.addEventListener('focus', () => {
          if (isMobileMapInteraction()) return;
          previewMapProvince(provinceNode.id);
        });

        provinceNode.addEventListener('blur', () => {
          if (isMobileMapInteraction()) return;
          clearHoveredMacroRegion();
        });
      };

      const initializeMap = () => {
        if (!mapFrame) return;

        const setMapLoadError = () => {
          if (mapStatus) {
            mapStatus.textContent = '대한민국 지도를 불러오지 못했습니다.';
          }
        };

        const requestMapSvg = (mapSource) => new Promise((resolve, reject) => {
          const request = new XMLHttpRequest();
          request.open('GET', mapSource, true);
          if (typeof request.overrideMimeType === 'function') {
            request.overrideMimeType('image/svg+xml');
          }
          request.onload = () => {
            if ((request.status >= 200 && request.status < 300) || request.status === 0) {
              resolve(request.responseText);
              return;
            }
            reject(new Error(`Map SVG request failed: ${request.status}`));
          };
          request.onerror = () => reject(new Error('Map SVG request failed'));
          request.send();
        });

        const handleMapReady = (svgRoot) => {
          if (!svgRoot) {
            return;
          }

          svgRootNode = svgRoot;
          mapOverlayNodes = Array.from(svgRoot.querySelectorAll('[data-map-overlay="true"]'));

          provinceNodes = Array.from(svgRoot.querySelectorAll('[id^="KR-"]')).filter((provinceNode, index) => {
            const macroRegionId = provinceMacroRegionMap.get(provinceNode.id);
            if (!macroRegionId) {
              provinceNode.style.fill = 'rgba(255,255,255,0.03)';
              provinceNode.style.stroke = 'rgba(255,255,255,0.08)';
              provinceNode.style.strokeWidth = '1';
              return false;
            }

            provinceNode.dataset.drawOrder = String(index);
            bindProvinceEvents(provinceNode, macroRegionId);
            return true;
          });

          mapFrame.classList.add('is-ready');
          if (mapStatus) {
            mapStatus.classList.add('is-hidden');
          }
          updateMapViewBoxForMobile();
          syncActiveState();
        };

        const loadMapSvg = async () => {
          try {
            const mapSource = mapFrame.dataset.mapSrc;
            if (!mapSource) {
              throw new Error('Map SVG source is missing');
            }

            const svgText = await requestMapSvg(mapSource);
            const svgDocument = new DOMParser().parseFromString(svgText, 'image/svg+xml');
            const svgRoot = svgDocument.querySelector('svg');
            const parseError = svgDocument.querySelector('parsererror');

            if (!svgRoot || parseError) {
              throw new Error('Map SVG parse failed');
            }

            const inlineSvgRoot = document.importNode(svgRoot, true);
            mapFrame.replaceChildren(inlineSvgRoot);
            handleMapReady(inlineSvgRoot);
          } catch (error) {
            setMapLoadError();
          }
        };

        loadMapSvg();
      };

      if (regionAccordion) {
        regionAccordion.addEventListener('mouseover', (event) => {
          const subregionButton = event.target.closest('[data-subregion-toggle]');
          if (!subregionButton) return;

          setSubregionHoverState(subregionButton);
        });

        regionAccordion.addEventListener('mouseout', (event) => {
          const subregionButton = event.target.closest('[data-subregion-toggle]');
          if (!subregionButton) return;

          const nextSubregionButton = typeof event.relatedTarget?.closest === 'function'
            ? event.relatedTarget.closest('[data-subregion-toggle]')
            : null;

          if (nextSubregionButton && regionAccordion.contains(nextSubregionButton)) {
            setSubregionHoverState(nextSubregionButton);
            return;
          }

          clearSubregionHoverState();
        });

        regionAccordion.addEventListener('focusin', (event) => {
          const subregionButton = event.target.closest('[data-subregion-toggle]');
          if (!subregionButton) return;

          setSubregionHoverState(subregionButton);
        });

        regionAccordion.addEventListener('focusout', (event) => {
          const subregionButton = event.target.closest('[data-subregion-toggle]');
          if (!subregionButton) return;

          const nextSubregionButton = typeof event.relatedTarget?.closest === 'function'
            ? event.relatedTarget.closest('[data-subregion-toggle]')
            : null;

          if (nextSubregionButton && regionAccordion.contains(nextSubregionButton)) {
            setSubregionHoverState(nextSubregionButton);
            return;
          }

          clearSubregionHoverState();
        });

        regionAccordion.addEventListener('click', (event) => {
          const interactiveMemberCard = event.target.closest('[data-member-href]');
          if (interactiveMemberCard) {
            window.open(interactiveMemberCard.dataset.memberHref, '_blank', 'noopener,noreferrer');
            return;
          }

          const regionButton = event.target.closest('[data-region-toggle]');
          if (regionButton) {
            toggleRegionPanel(regionButton.dataset.regionToggle);
            return;
          }

          const subregionButton = event.target.closest('[data-subregion-toggle]');
          if (!subregionButton) return;

          const macroRegionId = subregionButton.dataset.parentRegion;
          const subregionId = subregionButton.dataset.subregionToggle;
          const currentOpenSubregion = openSubregionByMacro.get(macroRegionId);
          const provinceId = getProvinceIdByFineRegion(subregionId);

          if (currentOpenSubregion === subregionId) {
            openSubregionByMacro.set(macroRegionId, null);
            selectedProvinceId = null;
          } else {
            openSubregionByMacro.set(macroRegionId, subregionId);
            selectedProvinceId = provinceId;
          }

          hasPinnedRegionSelection = true;
          hoveredMacroRegionId = null;
          activeMacroRegionId = macroRegionId;
          isRegionPanelOpen = true;
          renderRegionAccordion();
          syncActiveState();
        });

        regionAccordion.addEventListener('keydown', (event) => {
          const interactiveMemberCard = event.target.closest('[data-member-href]');
          if (!interactiveMemberCard) return;
          if (event.key !== 'Enter' && event.key !== ' ') return;

          event.preventDefault();
          window.open(interactiveMemberCard.dataset.memberHref, '_blank', 'noopener,noreferrer');
        });
      }

      if (activeMacroRegionId) {
        setActiveMacroRegion(activeMacroRegionId, { open: true });
      } else {
        renderRegionAccordion();
      }

      renderLogoWall();
      initializeMap();
      window.addEventListener('resize', updateMapViewBoxForMobile);
    </script>
  </body>
</html>
