<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NURA | 역대 회장단</title>
    <meta name="description" content="전국대학교로켓연합회(NURA)는 국내 대학 로켓 동아리와 학생 연구자들이 함께 교류하고 성장하는 전국 단위 연합회입니다." />
    <meta property="og:title" content="NURA | 역대 회장단" />
    <meta property="og:description" content="전국대학교로켓연합회(NURA)는 국내 대학 로켓 동아리와 학생 연구자들이 함께 교류하고 성장하는 전국 단위 연합회입니다." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nura.kr/members/leadership/" />
    <meta property="og:image" content="https://nura.kr/source/resources/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://nura.kr/source/resources/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="NURA 로고" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://nura.kr/source/resources/og-image.jpg" />
    <link rel="icon" type="image/png" sizes="32x32" href="../../source/resources/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="../../source/resources/favicon-16x16.png" />
    <link rel="shortcut icon" type="image/png" href="../../source/resources/favicon-32x32.png" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
      .page-main-title {
        word-break: keep-all;
        font-size: clamp(2.2rem, 6.4vw, 4.5rem);
      }

      @media (min-width: 1024px) and (max-width: 1380px) {
        .page-main-title {
          font-size: clamp(2rem, 5.2vw, 4rem);
        }
      }

      @media (max-width: 430px) {
        .page-main-title {
          font-size: clamp(1.75rem, 8.8vw, 2.3rem);
        }
      }
    </style>
    <script src="../../data/site-data.js?v=20260530-1"></script>
    <script src="../../data/shared-layout.js?v=20260530-2" defer></script>
  </head>
  <body class="bg-black text-white min-h-screen overflow-x-hidden" data-current-page="leadership" data-base-path="../..">
    <div class="page-shell flex flex-col">
      <div data-shared-header></div>

      <main class="w-full flex-1 flex flex-col">
        <section class="bg-black">
          <div class="relative max-w-7xl mx-auto w-full px-4 md:px-8 pt-12 md:pt-12 pb-16 md:pb-20">
            <section class="px-0 md:px-2 lg:px-4 pt-12 md:pt-16 pb-6 md:pb-8 border-b border-white/10">
              <div class="max-w-5xl">
                <h1 class="page-main-title mt-5 text-[42px] md:text-[72px] leading-none tracking-[-0.06em] font-semibold text-white">역대 회장단</h1>
                <p class="mt-6 text-gray-300 text-base md:text-lg leading-8 break-keep max-w-3xl">
                  전국대학교로켓연합회를 이끌어 온 역대 회장단의 기록입니다.
                </p>
              </div>
            </section>

            <section class="px-0 md:px-2 lg:px-4 py-3 md:py-4">
              <div id="presidents-list" class="space-y-0 border-t border-white/10"></div>
            </section>
          </div>
        </section>
      </main>

      <div data-shared-footer></div>
    </div>

    <script>
      (function() {
        const data = window.NURA_DATA?.presidentsData || [];
        const container = document.getElementById('presidents-list');
        if (!container) return;

        if (data.length === 0) {
          container.innerHTML = '<p class="text-white/45 text-sm md:text-[15px] py-4">데이터가 준비 중입니다.</p>';
          return;
        }

        const sorted = [...data].sort((a, b) => b.generation - a.generation);
        container.innerHTML = sorted.map(item => {
          let details = '';
          if (item.vicePresident) details += `<span class="inline-block mr-4">부회장: ${item.vicePresident}</span>`;
          if (item.secretary) details += `<span class="inline-block">총무: ${item.secretary}</span>`;

          return `
            <article class="w-full border-y border-white/10 py-7 md:py-10">
              <div class="grid grid-cols-1 md:grid-cols-[120px_minmax(0,1fr)] gap-4 md:gap-8 items-center">
                <div class="text-center text-4xl md:text-5xl font-light tracking-tighter text-white">
                  ${item.term}
                </div>
                <div class="min-w-0 space-y-2 md:space-y-2.5 text-right">
                  <p class="text-sm md:text-base text-white/45 font-normal tracking-[-0.02em]">제${item.generation}대</p>
                  <h2 class="text-xl md:text-2xl font-semibold tracking-[-0.04em] text-white break-keep">
                    회장 ${item.name}${item.university ? `<span class="ml-2 text-sm md:text-base text-white/45 font-medium tracking-[-0.02em]">${item.university}</span>` : ''}
                  </h2>
                  ${details ? `<p class="text-gray-300 text-[15px] md:text-[17px] leading-7 md:leading-8 break-keep">${details}</p>` : ''}
                </div>
              </div>
            </article>
          `;
        }).join('');
      })();
    </script>
  </body>
</html>
