    <script>
      (function () {
        const slides = document.querySelectorAll(".slide-img");
        const progressFill = document.querySelector(".hero-progress-fill");
        const toggleButton = document.querySelector(".hero-progress-toggle");

        if (!slides.length || !progressFill) return;

        const slideDuration = 5000;
        let current = 0;
        let isPaused = false;

        let slideStartTime = performance.now();
        let elapsedBeforePause = 0;
        let rafId = null;

        function loadSlide(img) {
          if (!img || img.src || !img.dataset.src) return;
          img.src = img.dataset.src;
        }

        function preloadUpcomingSlides(idx) {
          const preload = () => {
            loadSlide(slides[(idx + 1) % slides.length]);
            loadSlide(slides[(idx + 2) % slides.length]);
          };

          if ("requestIdleCallback" in window) {
            requestIdleCallback(preload, { timeout: 1600 });
          } else {
            setTimeout(preload, 400);
          }
        }

        function showSlide(idx) {
          loadSlide(slides[idx]);

          slides.forEach((img, i) => {
            img.style.opacity = i === idx ? "1" : "0";
            img.style.zIndex = i === idx ? "1" : "0";
          });

          current = idx;
          slideStartTime = performance.now();
          elapsedBeforePause = 0;
          progressFill.style.width = "0%";
          preloadUpcomingSlides(idx);
        }

        function nextSlide() {
          showSlide((current + 1) % slides.length);
        }

        function updateProgress(now) {
          if (isPaused) return;

          const elapsed = elapsedBeforePause + (now - slideStartTime);
          const progress = Math.min(elapsed / slideDuration, 1);

          progressFill.style.width = `${progress * 100}%`;

          if (progress >= 1) {
            nextSlide();
          }

          rafId = requestAnimationFrame(updateProgress);
        }

        function startLoop() {
          cancelAnimationFrame(rafId);
          slideStartTime = performance.now();
          rafId = requestAnimationFrame(updateProgress);
        }

        function pauseLoop() {
          cancelAnimationFrame(rafId);
          elapsedBeforePause += performance.now() - slideStartTime;
        }

        function resumeLoop() {
          slideStartTime = performance.now();
          rafId = requestAnimationFrame(updateProgress);
        }

        function setPausedState(paused) {
          isPaused = paused;

          if (isPaused) {
            pauseLoop();
            toggleButton.classList.add("is-play");
            toggleButton.setAttribute("aria-label", "슬라이드 재생");
          } else {
            toggleButton.classList.remove("is-play");
            toggleButton.setAttribute("aria-label", "슬라이드 일시정지");
            resumeLoop();
          }
        }

        if (toggleButton) {
          toggleButton.addEventListener("click", function () {
            setPausedState(!isPaused);
          });
        }

        showSlide(0);
        startLoop();
      })();
    </script>

    <script>
      (function () {
        const data = window.NURA_DATA;
        if (!data) return;

        const swiperWrapper = document.getElementById("news-swiper-wrapper");
        const statsContainer = document.getElementById("stats-list");

        if (swiperWrapper && typeof Swiper !== "undefined" && data.newsItems) {
          swiperWrapper.innerHTML = data.newsItems
            .map(
              (item) => `
                <div class="swiper-slide cursor-pointer group">
                  <div class="w-full h-full overflow-hidden">
                    <img
                      src="${item.image}"
                      alt="${item.title}"
                      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
                      loading="lazy"
                      decoding="async"
                    />
                  </div>
                </div>
              `
            )
            .join("");

          const titleEl = document.getElementById("news-hero-title");
          const summaryEl = document.getElementById("news-hero-summary");
          const dateEl = document.getElementById("news-hero-date");
          const linkEl = document.getElementById("news-hero-link");
          const curEl = document.getElementById("news-hero-current");
          const totEl = document.getElementById("news-hero-total");

          if (totEl) totEl.textContent = data.newsItems.length;

          const updateTextBox = (index) => {
            const item = data.newsItems[index];
            if (!item) return;
            if (titleEl) titleEl.textContent = item.title;
            if (summaryEl) summaryEl.textContent = item.summary;
            if (dateEl) dateEl.textContent = item.date;
            if (linkEl) linkEl.href = item.href;
            if (curEl) curEl.textContent = index + 1;
          };

          if (data.newsItems.length > 0) updateTextBox(0);

          const newsSwiper = new Swiper(".news-swiper", {
            loop: true,
            speed: 600,
            autoplay: {
              delay: 5000,
              disableOnInteraction: false,
            },
            navigation: {
              nextEl: ".news-next",
              prevEl: ".news-prev",
            },
            on: {
              slideChange: function () {
                updateTextBox(this.realIndex);
              },
            },
          });

          const slides = swiperWrapper.querySelectorAll('.swiper-slide');
          slides.forEach((slide) => {
             slide.addEventListener('click', () => {
                const itemIdx = slide.getAttribute('data-swiper-slide-index');
                const idx = itemIdx !== null ? parseInt(itemIdx, 10) : 0;
                const item = data.newsItems[idx];
                if(item && item.href) window.open(item.href, '_blank', 'noopener,noreferrer');
             });
          });
        }

        if (statsContainer) {
          statsContainer.innerHTML = data.overviewStats
            .map(
              (item) => `
                <article class="flex flex-col">
                  <p class="text-sm font-semibold tracking-widest text-gray-500 uppercase">${item.basis}</p>
                  <p class="mt-4 text-6xl md:text-7xl font-light tracking-tighter text-white">
                    <span class="count-up" data-target="${item.value}">0</span><span class="text-3xl text-gray-400 font-normal ml-1">${item.unit}</span>
                  </p>
                  <h3 class="mt-2 text-base font-medium text-gray-400">${item.label}</h3>
                </article>
              `
            )
            .join("");

          const counters = statsContainer.querySelectorAll(".count-up");
          const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          function animateCounter(el) {
            const target = parseInt(el.dataset.target, 10);
            const duration = 1400;
            const startTime = performance.now();

            function update(now) {
              const progress = Math.min((now - startTime) / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              const current = Math.floor(target * eased);

              el.textContent = current.toLocaleString();

              if (progress < 1) {
                requestAnimationFrame(update);
              } else {
                el.textContent = target.toLocaleString();
              }
            }

            requestAnimationFrame(update);
          }

          if (prefersReducedMotion) {
            counters.forEach((el) => {
              el.textContent = parseInt(el.dataset.target, 10).toLocaleString();
            });
          } else {
            const observer = new IntersectionObserver(
              (entries, obs) => {
                entries.forEach((entry) => {
                  if (entry.isIntersecting) {
                    animateCounter(entry.target);
                    obs.unobserve(entry.target);
                  }
                });
              },
              {
                threshold: 0.35
              }
            );

            counters.forEach((counter) => observer.observe(counter));
          }
        }
      })();
    </script>
  </body>
</html>
