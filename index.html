    <style>
      html { scroll-behavior: smooth; }
      html, body { background-color: #030712; overflow-x: hidden; }
      body { font-family: 'Pretendard', 'Noto Sans KR', sans-serif; }
      .page-shell { min-height: 100vh; }

      .hero-title {
        font-size: 88px;
        line-height: 1.15;
      }

      .hero-subtitle {
        margin-top: 8px;
        font-size: 28px;
        line-height: 1.45;
      }

      .reveal-line {
        display: block;
        overflow: hidden;
      }

      .reveal-text {
        display: inline-block;
        transform: translateY(108%);
        will-change: transform;
      }

      .reveal-line.is-visible .reveal-text {
        animation: textRise 0.95s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes textRise {
        from {
          transform: translateY(108%);
        }
        to {
          transform: translateY(0);
        }
      }

      .hero-copy-block {
        width: fit-content;
        max-width: 100%;
      }

      .hero-progress-inline {
        margin-top: 18px;
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: center;
        column-gap: 18px;
        width: 100%;
      }

      .hero-progress-toggle {
        flex: 0 0 auto;
        width: 36px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        background: transparent;
        border: 0;
        padding: 0;
        cursor: pointer;
        appearance: none;
      }

      .hero-progress-toggle .pause-bar {
        display: block;
        width: 4px;
        height: 24px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.96);
      }

      .hero-progress-toggle.is-play {
        gap: 0;
      }

      .hero-progress-toggle.is-play::before {
        content: "";
        display: block;
        width: 0;
        height: 0;
        border-top: 9px solid transparent;
        border-bottom: 9px solid transparent;
        border-left: 14px solid rgba(255, 255, 255, 0.96);
        margin-left: 2px;
      }

      .hero-progress-toggle.is-play .pause-bar {
        display: none;
      }

      .hero-progress-track {
        position: relative;
        height: 3px;
        width: 100%;
        background: rgba(255, 255, 255, 0.22);
        overflow: hidden;
      }

      .hero-progress-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        background: rgba(255, 255, 255, 0.95);
        transform-origin: left center;
      }

      @media (max-width: 767px) {
        .hero-title {
          font-size: 8vw;
        }

        .hero-subtitle {
          margin-top: 2vw;
          font-size: min(4vw, 20px);
          line-height: 1.35;
        }

        .hero-progress-inline {
          margin-top: 18px;
          column-gap: 14px;
        }

        .hero-progress-toggle {
          width: 24px;
          height: 20px;
          gap: 5px;
        }

        .hero-progress-toggle .pause-bar {
          width: 3px;
          height: 18px;
        }

        .hero-progress-toggle.is-play::before {
          border-top: 7px solid transparent;
          border-bottom: 7px solid transparent;
          border-left: 11px solid rgba(255, 255, 255, 0.96);
        }

        .hero-progress-track {
          height: 2px;
        }
      }
    </style>

    <script>
      window.addEventListener("load", function () {
        const lines = document.querySelectorAll(".hero-reveal .reveal-line");

        lines.forEach((line, index) => {
          setTimeout(() => {
            line.classList.add("is-visible");
          }, 220 + index * 180);
        });
      });
    </script>

    <script>
      (function () {
        const slides = document.querySelectorAll(".slide-img");
        const progressFill = document.querySelector(".hero-progress-fill");
        const toggleButton = document.querySelector(".hero-progress-toggle");

        if (!slides.length || !progressFill) return;

        const slideDuration = 5000;
        let current = 0;
        let isPaused = false;

        let slideStartTime = performance.now();
        let elapsedBeforePause = 0;
        let rafId = null;

        function showSlide(idx) {
          slides.forEach((img, i) => {
            img.style.opacity = i === idx ? "1" : "0";
            img.style.zIndex = i === idx ? "1" : "0";
          });

          current = idx;
          slideStartTime = performance.now();
          elapsedBeforePause = 0;
          progressFill.style.width = "0%";
        }

        function nextSlide() {
          showSlide((current + 1) % slides.length);
        }

        function updateProgress(now) {
          if (isPaused) return;

          const elapsed = elapsedBeforePause + (now - slideStartTime);
          const progress = Math.min(elapsed / slideDuration, 1);

          progressFill.style.width = `${progress * 100}%`;

          if (progress >= 1) {
            nextSlide();
          }

          rafId = requestAnimationFrame(updateProgress);
        }

        function startLoop() {
          cancelAnimationFrame(rafId);
          slideStartTime = performance.now();
          rafId = requestAnimationFrame(updateProgress);
        }

        function pauseLoop() {
          cancelAnimationFrame(rafId);
          elapsedBeforePause += performance.now() - slideStartTime;
        }

        function resumeLoop() {
          slideStartTime = performance.now();
          rafId = requestAnimationFrame(updateProgress);
        }

        function setPausedState(paused) {
          isPaused = paused;

          if (isPaused) {
            pauseLoop();
            toggleButton.classList.add("is-play");
            toggleButton.setAttribute("aria-label", "슬라이드 재생");
          } else {
            toggleButton.classList.remove("is-play");
            toggleButton.setAttribute("aria-label", "슬라이드 일시정지");
            resumeLoop();
          }
        }

        if (toggleButton) {
          toggleButton.addEventListener("click", function () {
            setPausedState(!isPaused);
          });
        }

        showSlide(0);
        startLoop();
      })();
    </script>

    <script>
      (function () {
        const counters = document.querySelectorAll(".count-up");
        if (!counters.length) return;

        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        if (prefersReducedMotion) {
          counters.forEach((counter) => {
            counter.textContent = counter.dataset.target;
          });
          return;
        }

        const animateCounter = (el) => {
          const target = parseInt(el.dataset.target, 10);
          const duration = 1200;
          const startTime = performance.now();

          function update(now) {
            const progress = Math.min((now - startTime) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            const value = Math.floor(target * eased);
            el.textContent = String(value).padStart(String(el.dataset.target).length, "0");

            if (progress < 1) {
              requestAnimationFrame(update);
            } else {
              el.textContent = el.dataset.target;
            }
          }

          requestAnimationFrame(update);
        };

        const observer = new IntersectionObserver(
          (entries, obs) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                animateCounter(entry.target);
                obs.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.4 }
        );

        counters.forEach((counter) => observer.observe(counter));
      })();
    </script>

    <script>
      (function () {
        const data = window.NURA_DATA;
        if (!data) return;

        const newsContainer = document.getElementById("news-list");
        const statsContainer = document.getElementById("stats-list");

        if (newsContainer) {
          newsContainer.innerHTML = data.newsItems
            .map(
              (item) => `
                <article class="rounded-3xl border border-white/10 bg-white/5 overflow-hidden hover:border-blue-400/40 transition">
                  <a href="${item.href}" target="_blank" rel="noopener noreferrer" class="block h-full">
                    <div class="aspect-[16/10] overflow-hidden bg-gray-900">
                      <img
                        src="${item.image}"
                        alt="${item.title}"
                        class="w-full h-full object-cover"
                        loading="lazy"
                      />
                    </div>

                    <div class="p-6">
                      <div class="text-sm text-gray-500 mb-3">${item.date}</div>

                      <h3 class="text-xl font-bold text-white leading-snug">
                        ${item.title}
                      </h3>

                      <p class="mt-4 text-gray-400 leading-7">
                        ${item.summary}
                      </p>

                      <span class="mt-6 inline-flex text-sm font-semibold text-blue-300 hover:text-blue-200">
                        기사 보기 →
                      </span>
                    </div>
                  </a>
                </article>
              `
            )
            .join("");
        }

        if (statsContainer) {
          statsContainer.innerHTML = data.overviewStats
            .map(
              (item) => `
                <article class="rounded-3xl border border-white/10 bg-white/5 p-6 md:p-7">
                  <p class="text-sm text-gray-500">${item.basis}</p>
                  <h3 class="mt-3 text-lg font-semibold text-gray-200">${item.label}</h3>
                  <p class="mt-5 text-4xl md:text-5xl font-extrabold tracking-[-0.03em] text-white">
                    <span class="count-up text-blue-300" data-target="${item.value}">0</span><span class="text-white">${item.unit}</span>
                  </p>
                </article>
              `
            )
            .join("");

          const counters = statsContainer.querySelectorAll(".count-up");
          const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

          function animateCounter(el) {
            const target = parseInt(el.dataset.target, 10);
            const duration = 1400;
            const startTime = performance.now();

            function update(now) {
              const progress = Math.min((now - startTime) / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              const current = Math.floor(target * eased);

              el.textContent = current.toLocaleString();

              if (progress < 1) {
                requestAnimationFrame(update);
              } else {
                el.textContent = target.toLocaleString();
              }
            }

            requestAnimationFrame(update);
          }

          if (prefersReducedMotion) {
            counters.forEach((el) => {
              el.textContent = parseInt(el.dataset.target, 10).toLocaleString();
            });
          } else {
            const observer = new IntersectionObserver(
              (entries, obs) => {
                entries.forEach((entry) => {
                  if (entry.isIntersecting) {
                    animateCounter(entry.target);
                    obs.unobserve(entry.target);
                  }
                });
              },
              {
                threshold: 0.35
              }
            );

            counters.forEach((counter) => observer.observe(counter));
          }
        }
      })();
    </script>
